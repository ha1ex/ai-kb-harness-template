# KB CI — детерминированный health-check + retrieval-eval с гейтом на регрессию.
#
# Закрывает backlog аудита P2 #13 (CI-матрица index → doctor → eval).
# LLM не вызывается: всё воспроизводимо (vector+BM25+RRF + механические проверки).
# Регрессия overall recall@k / MRR > порога vs коммитнутый scripts/semantic/eval-baseline.json → красный билд.

name: kb-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: kb-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health-and-eval:
    runs-on: ubuntu-latest
    env:
      KB_JOURNAL: '0' # журнал операций в CI не нужен (живёт в gitignored .context/)
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      # Restore/save разделены: модель (~120 MB ONNX e5-small) сохраняется СРАЗУ после успешной
      # сборки индекса, независимо от исхода eval. С единым actions/cache@v4 (save в post-step
      # только при успехе job) упавший eval оставлял бы каждый следующий прогон без кэша.
      - name: Restore embedding model cache
        id: model-cache
        uses: actions/cache/restore@v4
        with:
          path: scripts/semantic/.transformers-cache
          key: transformers-cache-e5-small-v1

      - name: Install semantic deps
        run: pnpm -C scripts/semantic install

      # Офлайн-юнит-тесты graph/temporal каналов (без модели и сети) — быстрый ранний гейт.
      # Корпус без related:/date не упражняет эти каналы, поэтому логика проверяется на фикстурах.
      - name: Retrieval channel unit tests (graph + temporal, offline)
        run: node scripts/semantic/test-retrieval.mjs

      # Control-логика (N1 critique + N4 provenance + маскирование примеров) — чистые функции,
      # без модели/БД. Ранний детерминированный гейт.
      - name: Control unit tests (verify critique + provenance, offline)
        run: node scripts/semantic/test-control.mjs

      # Adversarial-сьют контура доверия (A3): известные векторы обхода гейта
      # (path-traversal, регистр цитат, uncited FACT/DECISION, unclosed fence, external-corpus)
      # обязаны фейлиться. Рефакторинг verify/provenance, тихо открывший дыру, = красный билд.
      - name: Gate adversarial tests (verify/provenance red-team, offline)
        run: node scripts/semantic/test-gate.mjs
        env:
          KB_JOURNAL: '0'

      # Свежий checkout = свежие mtime → индекс собираем заново (он gitignored).
      # Первый прогон тянет модель с HuggingFace — соединение бывает флаки (connect timeout),
      # поэтому 3 попытки с очисткой частичного индекса между ними.
      - name: Build semantic index (retry on transient HF download)
        run: |
          set +e
          for i in 1 2 3; do
            node scripts/semantic/index.mjs && { echo "index built on attempt $i"; exit 0; }
            echo "::warning::index build attempt $i failed (likely HF download); cleaning partial DB, retry in 20s"
            rm -f .semantic-index.sqlite*
            sleep 20
          done
          echo "::error::index build failed after 3 attempts"
          exit 1

      # Сохраняем кэш модели только при успешной сборке (не отравить кэш частичной загрузкой)
      # и только если его ещё не было. Стоит ПЕРЕД doctor/eval — модель закэшируется даже если eval упадёт.
      - name: Save embedding model cache
        if: success() && steps.model-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: scripts/semantic/.transformers-cache
          key: transformers-cache-e5-small-v1

      - name: KB doctor (EXIT 0 contract)
        run: node scripts/kb-doctor.mjs

      # Цитатный + provenance-гейт (N3/N4): детерминированный Tier-1 (--no-semantic, без модели)
      # по слоям, несущим цитаты. Живые [source:/path] обязаны разрешаться; synthesis/decisions —
      # цитировать только более низкий слой пирамиды. Примеры в комментариях/коде игнорируются.
      - name: Citation + provenance gate (verify --scan, deterministic Tier-1)
        run: node scripts/semantic/verify.mjs --scan --provenance --no-semantic

      - name: Retrieval eval (gate on overall recall@k / MRR regression vs baseline)
        run: node scripts/semantic/eval.mjs

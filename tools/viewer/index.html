<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E📚%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KB Viewer</title>
    <script>
      // Устанавливаем data-theme до загрузки React, чтобы избежать вспышки темы (FOUC).
      // Источник истины — localStorage["v2-theme"].
      (function () {
        try {
          var t = window.localStorage.getItem("v2-theme") || "system";
          var isDark =
            t === "dark" ||
            (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = isDark ? "dark" : "light";
        } catch (_) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
